<!-- Open this file in a browser to generate PNG icons from the SVG avatar -->
<!-- Then save them as icon-192.png and icon-512.png -->
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function draw(canvas, size) {
  const ctx = canvas.getContext('2d');
  // Background
  ctx.fillStyle = '#fde68a';
  ctx.beginPath();
  ctx.arc(size/2, size/2, size/2, 0, Math.PI*2);
  ctx.fill();
  // Flag
  ctx.font = `${size*0.4}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🇮🇹', size/2, size*0.38);
  // Text
  ctx.fillStyle = '#4a3728';
  ctx.font = `bold ${size*0.12}px sans-serif`;
  ctx.fillText('TRIP', size/2, size*0.7);
}
draw(document.getElementById('c192'), 192);
draw(document.getElementById('c512'), 512);
</script>
